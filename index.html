<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple Audio Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Simple Audio Visualizer</h1>

    <div class="controls">
      <!-- File input for uploading audio -->
      <input type="file" id="audioFile" accept="audio/*">
      <button id="playBtn" disabled>Play</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="micBtn">Use Microphone</button>
      <label for="micSelect">Mic:</label>
      <select id="micSelect">
        <option value="">Default</option>
      </select>
      <label for="micGain">Gain</label>
      <input id="micGain" type="range" min="0" max="4" step="0.01" value="1">
      <label for="fftSize">FFT size</label>
      <select id="fftSize">
        <option value="256">256</option>
        <option value="512" selected>512</option>
        <option value="1024">1024</option>
        <option value="2048">2048</option>
      </select>
    </div>

    <p class="hint">Choose an audio file to get started (MP3, WAV, OGG...).</p>
    <p id="status" class="hint">Status: idle</p>
  </div>

  <!-- full-viewport canvas for visualization (moved outside .app to simplify stacking) -->
  <canvas id="canvas" tabindex="-1" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
